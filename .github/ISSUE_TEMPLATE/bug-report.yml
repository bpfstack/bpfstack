name: Bug Report
description: Report a bug encountered while operating bpfstack-cli
labels: kind/bug
body:
  - type: textarea
    id: version
    attributes:
      label: bpfstack version
    validations:
      required: true
  
  - type: textarea
    id: actiontype
    attributes:
      label: Action type
      description: |
        e.g., vmexit, syscall, etc.
      value: None
  
  - type: textarea
    id: os
    attributes:
      label: OS & Kernel version
      description: |
        Please provide both OS type and kernel version.
        Run `uname -r` to get your kernel version.
      placeholder: |
        OS: Ubuntu 22.04
        Kernel: 5.15.0-56-generic

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: |
        If relevant, please provide versions of other tools/software (e.g., iSCSI, systemd, containerd, etc.)
      value: None

  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: |
        Please provide as much info as possible. Not doing so may result in your bug not being addressed in a timely manner.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: How can we reproduce it (as minimally and precisely as possible)?
      value: None
  
  - type: textarea
    id: additional
    attributes:
      label: Anything else we need to know?
      value: None