
area/test:
  - changed-files:
    - any-glob-to-any-file:
      - test/**
      - '**/*_test.go'

area/deps:
  - changed-files:
    - any-glob-to-any-file:
      - go.mod
      - go.sum

area/workflows:
  - changed-files:
    - any-glob-to-any-file:
      - .github/**
      - .golangci.yml

area/docs:
  - changed-files:
    - any-glob-to-any-file:
      - 'README.md'

area/compute-action:
  - changed-files:
    - any-glob-to-any-file:
      - pkg/action/compute/**
